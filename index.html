<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sylvie's 1st Birthday</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #FFB6C1 0%, #FFC0CB 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            max-width: 600px;
        }

        h1 {
            color: #FF69B4;
            font-size: 3em;
            margin-bottom: 20px;
        }

        .subtitle {
            color: #666;
            font-size: 1.3em;
            margin-bottom: 30px;
        }

        .emoji {
            font-size: 4em;
            margin: 20px 0;
        }

        p {
            color: #555;
            font-size: 1.1em;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Happy 1st Birthday Sylvie! 🎉</h1>
        <p class="subtitle">Somebunny is One!</p>
        <div class="emoji">🐰🎂🎈</div>
        <p>Welcome to Sylvie's first birthday celebration!</p>
    </div>
</body>
</html>
